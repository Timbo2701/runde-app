<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background gradient: berry pink -->
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#E0357A"/>
      <stop offset="100%" stop-color="#A01E65"/>
    </radialGradient>
    <!-- Subtle glow behind card -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Decorative rings -->
  <circle cx="820" cy="200" r="180" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <circle cx="820" cy="200" r="110" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <circle cx="160" cy="860" r="120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Yellow glow blob behind card -->
  <ellipse cx="512" cy="500" rx="260" ry="200" fill="#FFD84D" opacity="0.12"/>

  <!-- App icon card: dark rounded square -->
  <rect x="272" y="272" width="480" height="480" rx="96" ry="96"
        fill="#1A0B2E" filter="url(#shadow)"/>

  <!-- Yellow circle behind R! -->
  <circle cx="512" cy="488" r="168" fill="#FFD84D" opacity="0.15"/>

  <!-- R! text -->
  <text x="512" y="560"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="220"
        fill="#FFD84D"
        text-anchor="middle"
        dominant-baseline="auto"
        letter-spacing="-8">R!</text>

  <!-- Subtle decorative dots -->
  <circle cx="330" cy="750" r="8" fill="rgba(255,216,77,0.4)"/>
  <circle cx="694" cy="290" r="6" fill="rgba(255,216,77,0.3)"/>
  <circle cx="710" cy="740" r="10" fill="rgba(255,255,255,0.15)"/>
</svg>
