workflows:
  ios-build:
    name: Runde iOS (unsigned IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - supabase
      node: 22.13.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Verify Supabase production environment
        script: |
          set -eu
          : "${EXPO_PUBLIC_SUPABASE_URL:?Add EXPO_PUBLIC_SUPABASE_URL to the Codemagic group 'supabase'}"
          if [ -z "${EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}" ] && [ -z "${EXPO_PUBLIC_SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY (or legacy EXPO_PUBLIC_SUPABASE_ANON_KEY) in Codemagic group 'supabase'."
            exit 1
          fi
          case "$EXPO_PUBLIC_SUPABASE_URL" in
            https://*.supabase.co) ;;
            *) echo "EXPO_PUBLIC_SUPABASE_URL must be an https://*.supabase.co URL."; exit 1 ;;
          esac
          npx expo config --type public >/dev/null
          echo "Supabase environment is present for Expo bundling."

      - name: Validate app and iOS JavaScript bundle
        script: |
          set -eu
          npm run validate
          npx expo export --platform ios --no-bytecode --output-dir /tmp/runde-ios-preflight

      - name: Prebuild iOS (generate native project)
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build unsigned IPA
        script: |
          set -eu
          xcodebuild \
            -workspace ios/Runde.xcworkspace \
            -scheme Runde \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p build/unsigned
          cp -r build/Build/Products/Release-iphoneos/Runde.app build/unsigned/
          cd build/unsigned
          mkdir Payload
          cp -r Runde.app Payload/
          zip -r Runde.ipa Payload/

    artifacts:
      - build/unsigned/Runde.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - tim.mery02@gmail.com
        notify:
          success: true
          failure: true
