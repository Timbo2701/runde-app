workflows:
  ios-build:
    name: Runde iOS (IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.0.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.runde.app"
      ios_signing:
        distribution_type: app_store   # or: ad_hoc
        bundle_identifier: com.runde.app

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Set up Expo
        script: npx expo install --fix

      - name: Prebuild iOS (generate native project)
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runde.xcworkspace \
            --scheme Runde

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - tim.mery02@gmail.com
        notify:
          success: true
          failure: true
