workflows:
  ios-build:
    name: Runde iOS (unsigned IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.0.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Prebuild iOS (generate native project)
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -workspace ios/Runde.xcworkspace \
            -scheme Runde \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p build/unsigned
          cp -r build/Build/Products/Release-iphoneos/Runde.app build/unsigned/
          cd build/unsigned
          mkdir Payload
          cp -r Runde.app Payload/
          zip -r Runde.ipa Payload/

    artifacts:
      - build/unsigned/Runde.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - tim.mery02@gmail.com
        notify:
          success: true
          failure: true
